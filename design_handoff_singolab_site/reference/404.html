<style>
  :root{ --serif:"Newsreader",Georgia,serif; --body:"Literata",Georgia,serif; --mono:"Spline Sans Mono",monospace;
    --paper:#FAF7F2; --ink:#2A2622; --ink-2:#5A544C; --ink-3:#948C81; --line-2:rgba(42,38,34,.2); --accent:#2F5BDB; }
  html[data-theme="dark"]{ --paper:#15120E; --ink:#F1EBE0; --ink-2:#BEB4A5; --ink-3:#8A8073; --line-2:rgba(241,235,224,.2); --accent:#7AA0FF; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:var(--paper); color:var(--ink); font-family:var(--body);
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .kick{ font-family:var(--mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); }
  h1{ font-family:var(--serif); font-weight:500; font-size:clamp(64px,16vw,150px); letter-spacing:-.03em; margin:14px 0 0; line-height:.9; }
  p{ font-family:var(--serif); font-size:clamp(18px,2.4vw,23px); color:var(--ink-2); margin:18px 0 30px; }
  a.home{ font-family:var(--mono); font-size:13px; letter-spacing:.04em; color:var(--ink-2); border:1px solid var(--line-2); border-radius:100px; padding:11px 20px; text-decoration:none; transition:.2s; }
  a.home:hover{ color:var(--ink); border-color:var(--accent); }

  </script>
